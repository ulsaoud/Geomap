<!DOCTYPE html>
<html lang="hi" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geomap - Location Manager</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        }
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* 3D Glassmorphism Utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }
        
        .dark .glass-panel {
            background: rgba(17, 24, 39, 0.45);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .dark .glass-button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .glass-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        /* Accordion Animations - Smooth Fix */
        .accordion-content {
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease-in-out, transform 0.3s ease;
            max-height: 0;
            opacity: 0;
            transform: translateY(-10px);
            overflow: hidden;
        }
        .accordion-content.open {
            max-height: 2000px; 
            opacity: 1;
            transform: translateY(0);
        }
        .rotate-arrow {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .rotate-arrow.open {
            transform: rotate(180deg);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(203, 213, 225, 0.5);
            border-radius: 4px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: rgba(71, 85, 105, 0.5);
        }
        
        /* Animation Delay Utilities */
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
    </style>
</head>
<body class="bg-slate-50 text-gray-800 dark:bg-slate-900 dark:text-gray-100 transition-colors duration-500 min-h-screen flex flex-col relative">

    <!-- Background 3D Blobs -->
    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-40 animate-blob z-[0] dark:bg-blue-600 dark:opacity-20 pointer-events-none"></div>
    <div class="fixed top-[20%] right-[-10%] w-96 h-96 bg-purple-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-40 animate-blob animation-delay-2000 z-[0] dark:bg-purple-800 dark:opacity-20 pointer-events-none"></div>
    <div class="fixed bottom-[-20%] left-[20%] w-96 h-96 bg-pink-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-40 animate-blob animation-delay-4000 z-[0] dark:bg-pink-800 dark:opacity-20 pointer-events-none"></div>

                <span id="editIndicator" class="absolute top-0 right-0 w-3 h-3 bg-green-500 border-2 border-white dark:border-gray-900 rounded-full hidden shadow-[0_0_10px_rgba(34,197,94,0.8)]"></span>
            </button>
        </div>
    </header>

    <!-- Main Content -->

    <!-- App Logic & Firebase Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // =========================================================
        // Firebase Configuration
        // =========================================================
        let firebaseConfig = {
            apiKey: "AIzaSyAQHkCB__cG5r2aoAj9tzC_Ieq8LRMHrts",
            authDomain: "saoud-s-tools.firebaseapp.com",
            projectId: "saoud-s-tools",
            storageBucket: "saoud-s-tools.firebasestorage.app",
            messagingSenderId: "262893042738",
            appId: "1:262893042738:web:6b44bf8478f164db94102b",
            measurementId: "G-F7L5KSVRP9"
        };

        let isCanvasEnvironment = false;
        if (typeof __firebase_config !== 'undefined') {
            firebaseConfig = JSON.parse(__firebase_config);
            isCanvasEnvironment = true;
        }

        const isFirebaseEnabled = firebaseConfig && firebaseConfig.apiKey !== "";
        let db, auth, currentUser;

        // State
        window.isEditMode = false;
        window.isDarkMode = false;
        window.currentTab = 'google'; 
        
        // --- Login Logic ---
        window.checkLogin = function() {
            const pwd = document.getElementById('loginPwd').value;
            if (pwd === 'EX') {
                const overlay = document.getElementById('loginOverlay');
                overlay.style.opacity = '0';
                overlay.style.transform = 'scale(1.05)';
                render(); 
                setTimeout(() => {
                    overlay.style.display = 'none';
                    initApp();
                }, 400);
            } else {
                const errorText = document.getElementById('loginError');
                errorText.style.opacity = '1';
                setTimeout(() => errorText.style.opacity = '0', 2500);
            }
        };

        document.getElementById('loginPwd').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { window.checkLogin(); }
        });

        // --- Custom Modal Logic ---
        window.openModal = function(title, fields, onConfirm, isConfirmOnly = false) {
            const modal = document.getElementById('customModal');
            const content = document.getElementById('modalContent');
            modal.classList.remove('hidden');
            setTimeout(() => content.classList.replace('scale-95', 'scale-100'), 10);
            
            document.getElementById('modalTitle').innerText = title;
            const inputsDiv = document.getElementById('modalInputs');
            inputsDiv.innerHTML = '';
            
            if (isConfirmOnly) {
                inputsDiv.innerHTML = `<p class="text-gray-700 dark:text-gray-300 font-medium">${fields}</p>`;
            } else {
                fields.forEach((f, idx) => {
                    inputsDiv.innerHTML += `
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1 ml-1">${f.label}</label>
                            <input type="text" id="${f.id}" value="${f.value || ''}" placeholder="${f.placeholder || ''}" class="w-full p-3 rounded-xl bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-gray-700 focus:ring-2 focus:ring-brand-500 outline-none text-gray-800 dark:text-white transition-all">
                        </div>
                    `;
                });
            }

            const saveBtn = document.getElementById('modalSaveBtn');
            saveBtn.innerText = isConfirmOnly ? 'Yes, Delete' : 'Save';
            if(isConfirmOnly) {
                saveBtn.className = "px-5 py-2.5 rounded-xl font-bold bg-red-500 text-white hover:bg-red-600 transition-colors shadow-md";
            } else {
                saveBtn.className = "px-5 py-2.5 rounded-xl font-bold bg-brand-500 text-white hover:bg-brand-600 transition-colors shadow-md";
            }

            const newSaveBtn = saveBtn.cloneNode(true);
            saveBtn.parentNode.replaceChild(newSaveBtn, saveBtn);

            newSaveBtn.onclick = () => {
                if (isConfirmOnly) {
                    onConfirm();
                } else {
                    const results = {};
                    let allValid = true;
                    fields.forEach(f => {
                        const val = document.getElementById(f.id).value.trim();
                        if(!val && f.required !== false) allValid = false;
                        results[f.id] = val;
                    });
                    if(!allValid) return window.showStatus('कृपया सभी जानकारी भरें', 'red');
                    onConfirm(results);
                }
                window.closeModal();
            };
        };

        window.closeModal = function() {
            const content = document.getElementById('modalContent');
            content.classList.replace('scale-100', 'scale-95');
            setTimeout(() => {
                document.getElementById('customModal').classList.add('hidden');
            }, 150);
        };

        // --- Initialization ---
        async function initApp() {
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                window.setDarkMode(true);
            } else {
                window.setDarkMode(false);
            }

            if (!window.appData[window.currentTab]) {
                window.currentTab = Object.keys(window.appData)[0];
            }

            if (isFirebaseEnabled) {
                try {
                    const app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);

                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }

                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            currentUser = user;
                            setupRealtimeData();
                        }
                    });
                } catch (error) {
                    console.error("Firebase Init Error:", error);
                }
            }
        }

        // --- Data Sync ---
        function getFirebaseDocRef() {
            if (isCanvasEnvironment) {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'geomap_local';
                return doc(db, 'artifacts', appId, 'public', 'data', 'geomaps', 'master_list');
            } else {
                return doc(db, 'geomaps', 'master_list');
            }
        }

        function setupRealtimeData() {
            if (!currentUser || !db) return;
            
            const docRef = getFirebaseDocRef();

            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists() && docSnap.data().appData) {
                    let incomingData = docSnap.data().appData;

                    // FIX 2: हम जो UI State (कैटेगरी खुली है या बंद) सेव कर रहे थे, उसे बचा रहे हैं। 
                    // ताकि बैकग्राउंड में डेटा सिंक होने पर खुली हुई कैटेगरी अचानक बंद न हो।
                    if (window.appData) {
                        Object.keys(incomingData).forEach(secKey => {
                            if (window.appData[secKey] && window.appData[secKey].categories) {
                                incomingData[secKey].categories.forEach(incCat => {
                                    const localCat = window.appData[secKey].categories.find(c => c.name === incCat.name);
                                    if (localCat) incCat.isOpen = localCat.isOpen; // Preserve local UI state
                                });
                            }
                        });
                    }

                    window.appData = incomingData;
                    if(!window.appData[window.currentTab]) window.currentTab = Object.keys(window.appData)[0];
                    render();
                    // FIX 1: Cloud Synced का अलर्ट पूरी तरह हटा दिया गया है।
                } else {
                    window.saveDataToCloud();
                    render();
                }
            }, (error) => {
                console.error("Firestore Error:", error);
            });
        }

        window.saveDataToCloud = async function() {
            if (isFirebaseEnabled && currentUser && db) {
                const docRef = getFirebaseDocRef();
                try {
                    await setDoc(docRef, { appData: window.appData }, { merge: true });
                } catch (e) {
                    console.error("Save error", e);
                }
            }
        };

        // --- UI Render ---
        function render() {
            const appContainer = document.getElementById('appContainer');
            appContainer.innerHTML = '';
            
            const tabsContainer = document.createElement('div');
            tabsContainer.className = "flex p-2 gap-3 glass-panel rounded-2xl mb-8 overflow-x-auto w-fit max-w-full mx-auto shadow-sm";
            
            Object.values(window.appData).forEach(section => {
                const isActive = window.currentTab === section.id;
                const btn = document.createElement('button');
                
                if (isActive) {
                    btn.className = `px-5 py-2.5 rounded-xl font-bold transition-all flex items-center gap-2 shadow-lg scale-[1.02] ${section.id === 'maple' ? 'bg-gradient-to-r from-red-500 to-rose-600' : 'bg-gradient-to-r from-brand-500 to-purple-600'} text-white`;
                } else {
                    btn.className = "px-5 py-2.5 rounded-xl font-semibold transition-all flex items-center gap-2 hover:bg-white/40 dark:hover:bg-black/20 text-gray-700 dark:text-gray-300";
                }
                
                btn.onclick = () => { window.currentTab = section.id; render(); };
                btn.innerHTML = `
                    <div class="${isActive ? 'text-white' : (section.id === 'maple' ? 'text-red-500' : 'text-blue-500')}">
                        ${section.icon}
                    </div>
                    <span>${section.title}</span>
                `;
                tabsContainer.appendChild(btn);
            });
            appContainer.appendChild(tabsContainer);

            const section = window.appData[window.currentTab];
            if (!section) return;

            const sectionEl = document.createElement('div');
            sectionEl.className = "relative z-10 animate-[fadeIn_0.3s_ease-out]"; 
            
            if (window.isEditMode) {
                const header = document.createElement('div');
                header.className = "flex justify-end mb-4 px-1";
                header.innerHTML = `
                    <button onclick="window.addCategory('${section.id}')" class="text-sm bg-gradient-to-r from-brand-500 to-brand-600 text-white px-4 py-2 rounded-xl shadow-[0_4px_15px_rgba(14,165,233,0.4)] hover:shadow-[0_6px_20px_rgba(14,165,233,0.6)] font-semibold transition-all hover:-translate-y-1">+ New Category</button>
                `;
                sectionEl.appendChild(header);
            }

            const catContainer = document.createElement('div');
            catContainer.className = "space-y-4";
            
            section.categories.forEach((cat, catIndex) => {
                const catWrapper = document.createElement('div');
                // Added identifier 'cat-wrapper' for smooth toggling
                catWrapper.className = "cat-wrapper glass-panel rounded-2xl overflow-hidden transition-all duration-300 hover:shadow-2xl";
                
                const accHeader = document.createElement('button');
                accHeader.className = "w-full flex items-center justify-between p-5 hover:bg-white/10 dark:hover:bg-black/10 transition-colors text-left outline-none";
                accHeader.onclick = (e) => {
                    if(e.target.closest('.edit-action')) return;
                    window.toggleCategory(section.id, catIndex);
                };

                accHeader.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="font-bold text-[1.15rem] text-gray-800 dark:text-gray-100 tracking-wide">${cat.name}</span>
                        ${window.isEditMode ? `
                            <button onclick="window.editCategoryName('${section.id}', ${catIndex})" class="edit-action text-brand-500 hover:text-brand-600 p-2 glass-button rounded-lg" title="Edit Name">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
                            </button>
                        ` : ''}
                    </div>
                    <div class="flex items-center gap-3">
                        ${window.isEditMode ? `
                            <button onclick="window.deleteCategory('${section.id}', ${catIndex})" class="edit-action text-red-500 hover:text-red-600 p-2 glass-button rounded-lg" title="Delete Category">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            </button>
                        ` : ''}
                        <svg class="w-6 h-6 text-brand-500 dark:text-brand-400 rotate-arrow ${cat.isOpen ? 'open' : ''}" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" />
                        </svg>
                    </div>
                `;
                catWrapper.appendChild(accHeader);

                const accBody = document.createElement('div');
                accBody.className = `accordion-content ${cat.isOpen ? 'open' : ''}`;
                
                const innerContent = document.createElement('div');
                innerContent.className = "p-5 pt-2 border-t border-gray-200/30 dark:border-gray-700/30";

                if (cat.links.length > 0) {
                    const list = document.createElement('ul');
                    list.className = "space-y-3";
                    cat.links.forEach((link, linkIndex) => {
                        const li = document.createElement('li');
                        li.className = "flex items-center justify-between group p-3 rounded-xl hover:bg-white/40 dark:hover:bg-black/20 transition-all border border-transparent hover:border-white/30 dark:hover:border-white/10";
                        
                        li.innerHTML = `
                            <a href="${link.url}" target="_blank" class="flex items-center gap-4 text-[1.05rem] text-gray-700 dark:text-gray-200 hover:text-brand-600 dark:hover:text-brand-400 flex-grow min-w-0" title="${link.name}">
                                <div class="shrink-0 p-2 bg-gradient-to-br from-brand-100 to-brand-50 dark:from-gray-800 dark:to-gray-700 rounded-lg text-brand-500 shadow-sm group-hover:scale-110 transition-transform">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                                </div>
                                <span class="font-medium line-clamp-2 break-words leading-tight" style="word-break: break-word;">${link.name}</span>
                            </a>
                            ${window.isEditMode ? `
                                <div class="shrink-0 flex items-center gap-2 pl-3 border-l border-gray-300/50 dark:border-gray-600/50 ml-2">
                                    <button onclick="window.editLink('${section.id}', ${catIndex}, ${linkIndex})" class="p-2 text-blue-500 hover:text-white hover:bg-blue-500 rounded-lg transition-colors shadow-sm glass-button" title="Edit Link">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
                                    </button>
                                    <button onclick="window.deleteLink('${section.id}', ${catIndex}, ${linkIndex})" class="p-2 text-red-500 hover:text-white hover:bg-red-500 rounded-lg transition-colors shadow-sm glass-button" title="Delete Link">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                    </button>
                                </div>
                            ` : ''}
                        `;
                        list.appendChild(li);
                    });
                    innerContent.appendChild(list);
                } else {
                    innerContent.innerHTML += `<div class="text-sm text-gray-500 dark:text-gray-400 italic text-center py-4 bg-black/5 rounded-xl border border-dashed border-gray-300 dark:border-gray-700">कोई लोकेशन नहीं जोड़ी गई है।</div>`;
                }

                if (window.isEditMode) {
                    const addBtn = document.createElement('button');
                    addBtn.className = "mt-4 w-full py-3 text-[1rem] font-medium flex items-center justify-center gap-2 text-brand-600 dark:text-brand-300 bg-white/30 dark:bg-black/20 hover:bg-white/50 dark:hover:bg-black/40 rounded-xl border border-dashed border-brand-300 dark:border-brand-700 transition-all hover:scale-[1.01]";
                    addBtn.innerHTML = `<span>+ Add Location</span>`;
                    addBtn.onclick = () => window.addLink(section.id, catIndex);
                    innerContent.appendChild(addBtn);
                }

                accBody.appendChild(innerContent);
                catWrapper.appendChild(accBody);
                catContainer.appendChild(catWrapper);
            });

            sectionEl.appendChild(catContainer);
            appContainer.appendChild(sectionEl);
        }

        // --- Actions (Global scope for HTML bindings) ---
        window.toggleCategory = function(sectionId, catIndex) {
            const section = window.appData[sectionId];
            const clickedCat = section.categories[catIndex];
            const wasOpen = clickedCat.isOpen;

            // FIX 3: सिर्फ लोकल UI का स्टेट बदल रहे हैं, बिना क्लाउड पे सेव किए।
            Object.values(window.appData).forEach(sec => sec.categories.forEach(c => c.isOpen = false));
            clickedCat.isOpen = !wasOpen;

            // FIX 4: बिना पेज रीलोड (render) किए सिर्फ CSS Classes बदलकर स्मूथ एनीमेशन
            const allCatWrappers = document.querySelectorAll('.cat-wrapper');
            allCatWrappers.forEach((wrapper, idx) => {
                const content = wrapper.querySelector('.accordion-content');
                const arrow = wrapper.querySelector('.rotate-arrow');
                if (idx === catIndex && clickedCat.isOpen) {
                    content.classList.add('open');
                    arrow.classList.add('open');
                } else {
                    content.classList.remove('open');
                    arrow.classList.remove('open');
                }
            });
            // नोट: यहाँ window.saveDataToCloud() और render() को हटा दिया गया है ताकि वेबसाइट क्रैश न हो।
        };

        window.addCategory = function(sectionId) {
            window.openModal("नई कैटेगरी", [
                { id: "catName", label: "कैटेगरी का नाम", placeholder: "जैसे: Office, Family..." }
            ], (res) => {
                window.appData[sectionId].categories.push({ name: res.catName, isOpen: true, links: [] });
                window.saveDataToCloud(); // डेटा बदल रहा है इसलिए सेव करेंगे
                render();
            });
        };
        
        window.editCategoryName = function(sectionId, catIndex) {
            const currentName = window.appData[sectionId].categories[catIndex].name;
            window.openModal("कैटेगरी बदलें", [
                { id: "catName", label: "कैटेगरी का नाम", value: currentName }
            ], (res) => {
                window.appData[sectionId].categories[catIndex].name = res.catName;
                window.saveDataToCloud();
                render();
            });
        };

        window.deleteCategory = function(sectionId, catIndex) {
            window.openModal("चेतावनी", "क्या आप वाकई इस कैटेगरी और इसके सभी लोकेशंस को डिलीट करना चाहते हैं?", () => {
                window.appData[sectionId].categories.splice(catIndex, 1);
                window.saveDataToCloud();
                render();
            }, true);
        };

        window.addLink = function(sectionId, catIndex) {
            window.openModal("नई लोकेशन जोड़ें", [
                { id: "locName", label: "लोकेशन का नाम", placeholder: "उदा: नाना का घर" },
                { id: "locUrl", label: "मैप लिंक (URL)", placeholder: "https://maps.app.goo.gl/..." }
            ], (res) => {
                window.appData[sectionId].categories[catIndex].links.push({ name: res.locName, url: res.locUrl });
                window.saveDataToCloud();
                render();
            });
        };

        window.editLink = function(sectionId, catIndex, linkIndex) {
            const linkObj = window.appData[sectionId].categories[catIndex].links[linkIndex];
            window.openModal("लोकेशन एडिट करें", [
                { id: "locName", label: "लोकेशन का नाम", value: linkObj.name },
                { id: "locUrl", label: "मैप लिंक (URL)", value: linkObj.url }
            ], (res) => {
                linkObj.name = res.locName;
                linkObj.url = res.locUrl;
                window.saveDataToCloud();
                render();
                window.showStatus('Link Updated', 'green');
            });
        };

        window.deleteLink = function(sectionId, catIndex, linkIndex) {
            window.openModal("डिलीट कन्फर्मेशन", "क्या आप इस लोकेशन को हमेशा के लिए डिलीट करना चाहते हैं?", () => {
                window.appData[sectionId].categories[catIndex].links.splice(linkIndex, 1);
                window.saveDataToCloud();
                render();
            }, true);
        };

        window.toggleTheme = function() {
            window.setDarkMode(!window.isDarkMode);
        };

        window.setDarkMode = function(value) {
            window.isDarkMode = value;
            const sunIcon = document.getElementById('sunIcon');
            const moonIcon = document.getElementById('moonIcon');
            if (window.isDarkMode) {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                sunIcon.classList.remove('hidden');
                moonIcon.classList.add('hidden');
            } else {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        };

        window.toggleEdit = function() {
            window.isEditMode = !window.isEditMode;
            const editToggle = document.getElementById('editToggle');
            const editIndicator = document.getElementById('editIndicator');
            
            editToggle.classList.toggle('active');
            
            if (window.isEditMode) {
                editIndicator.classList.remove('hidden');
                editToggle.classList.add('bg-white/40', 'dark:bg-black/40');
                window.showStatus('Edit Mode Active', 'green');
            } else {
                editIndicator.classList.add('hidden');
                editToggle.classList.remove('bg-white/40', 'dark:bg-black/40');
                window.showStatus('Edit Mode Disabled', 'gray');
            }
            render();
        };

        window.showStatus = function(msg, color) {
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.textContent = msg;
            
            if (color === 'green') {
                statusMessage.className = "mb-6 p-3 rounded-xl text-center text-[0.95rem] font-semibold glass-panel text-brand-700 dark:text-brand-300 border border-green-300 dark:border-green-700 transform transition-all duration-300 scale-100 opacity-100";
            } else if (color === 'red') {
                statusMessage.className = "mb-6 p-3 rounded-xl text-center text-[0.95rem] font-semibold glass-panel text-red-700 dark:text-red-300 border border-red-300 dark:border-red-700 transform transition-all duration-300 scale-100 opacity-100";
            } else {
                statusMessage.className = "mb-6 p-3 rounded-xl text-center text-[0.95rem] font-semibold glass-panel text-gray-700 dark:text-gray-300 border border-gray-300 dark:border-gray-700 transform transition-all duration-300 scale-100 opacity-100";
            }
            
            statusMessage.classList.remove('hidden');
            setTimeout(() => {
                statusMessage.classList.add('scale-95', 'opacity-0');
                setTimeout(() => statusMessage.classList.add('hidden'), 300);
            }, 2500);
        };

        // CSS for fade-in animation
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(5px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);

    </script>
</body>
</html>
